# ╔══════════════════════════════════════════════════════════╗
# ║  UNDERTALE THEME — Strict 1-Bit Monochrome              ║
# ║  Pure white active borders, pure black inactive          ║
# ║  Zero rounding, zero blur, zero shadow                   ║
# ╚══════════════════════════════════════════════════════════╝

general {
    border_size = 3
    col.active_border = rgba(ffffffee)
    col.inactive_border = rgba(000000ee)
}

decoration {
    rounding = 0
    rounding_power = 0

    shadow {
        enabled = false
    }

    blur {
        enabled = false
    }
}

group {
    col.border_active = rgba(ffffffee)
    col.border_inactive = rgba(000000ee)

    groupbar {
        col.active = rgba(ffffffff)
        col.inactive = rgba(000000ff)
    }
}
