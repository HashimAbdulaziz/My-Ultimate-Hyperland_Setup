# --- BACKGROUND ---
background {
    monitor =
    path = ~/Pictures/lofi.jpeg
    blur_passes = 2
    contrast = 1
    brightness = 0.5
    vibrancy = 0.2
    vibrancy_darkness = 0.2
}

# --- TIME ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%H:%M")"
    color = rgba(192, 202, 245, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 150
    halign = center
    valign = center
}

# --- DATE ---
label {
    monitor =
    text = cmd[update:10000] echo "$(date +"%A, %d %B")"
    color = rgba(192, 202, 245, 1.0)
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, 20
    halign = center
    valign = center
}

# --- PASSWORD INPUT FIELD ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgba(26, 27, 38, 0)
    inner_color = rgba(36, 40, 59, 0.8)
    font_color = rgba(192, 202, 245, 1.0)
    fade_on_empty = false
    placeholder_text = <i><span foreground="##c0caf5">Password...</span></i>
    hide_input = false
    position = 0, -70
    halign = center
    valign = center
}

# --- QURAN AYAH ---
label {
    monitor =
    text = cmd[update:0] ~/.config/hypr/scripts/quran_ayah.sh
    color = rgba(187, 154, 247, 1.0) # Tokyo Night Purple Accent
    font_size = 18
    font_family = Noto Sans Arabic, JetBrainsMono Nerd Font
    position = 0, -200
    halign = center
    valign = center
}
