# ╔══════════════════════════════════════════════════════════╗
# ║  SOLAR ZEN KITTY THEME — Deep Space Monochrome           ║
# ║  A minimal charcoal palette evoking the void of space.  ║
# ╚══════════════════════════════════════════════════════════╝

# ── Core ─────────────────────────────────────────────────────
foreground            #d0d0d0
background            #06060f
selection_foreground  #0a0a0a
selection_background  #6e6e6e

# ── Cursor ───────────────────────────────────────────────────
cursor                #888888
cursor_text_color     #0a0a0a

# ── URLs ─────────────────────────────────────────────────────
url_color             #707070
url_style             single

# ── 16-Color Palette (dark grey spectrum) ────────────────────
# Black / Dark grey
# color0 = app internal black (keep close to bg)
# color8 = "bright black" — THIS is what solcl uses for orbital ring paths.
#           Must be visibly lighter than background for rings to appear!
color0   #06060f
color8   #2a2a42

# Red → dim rust (errors)
color1   #7a3030
color9   #9e4444

# Green → muted steel (success)
color2   #3a5a3a
color10  #557755

# Yellow → dim amber (warnings)
color3   #6e5a28
color11  #9a7f3a

# Blue → slate (links, accents)
color4   #2e4060
color12  #4a6480

# Magenta → muted violet
color5   #4a3050
color13  #6a4a70

# Cyan → cool steel (info)
color6   #2e4e52
color14  #406870

# White / Light grey
color7   #8a8a8a
color15  #c8c8c8

# ── Tab Bar ──────────────────────────────────────────────────
active_tab_foreground   #c8c8c8
active_tab_background   #2a2a2a
inactive_tab_foreground #555555
inactive_tab_background #111111

# ── Background opacity (deep dark, semi-transparent) ─────────
background_opacity      0.88
