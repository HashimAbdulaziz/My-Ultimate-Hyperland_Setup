# Adds a blank line between commands for a cleaner look
add_newline = true

# LEFT SIDE: Directory and active programming languages
format = """
$directory\
$git_branch\
$nodejs\
$c\
$java\
$line_break\
$character"""

# RIGHT SIDE: Execution Status and Time Spent
right_format = """
$status\
$cmd_duration"""

[directory]
# Deep Purple pill from your screenshot
style = "bg:#7a00ff fg:#ffffff bold"
format = "[оӮ¶](#7a00ff)[пҒј $path ]($style)[оӮҙ](#7a00ff) "
truncation_length = 3
truncate_to_repo = false

[status]
disabled = false
# Pill shapes are built directly into the symbols so they color perfectly
format = "$symbol"
success_symbol = "[оӮ¶](#12ff00)[ вң“ ](bg:#12ff00 fg:#000000 bold)[оӮҙ](#12ff00) "
symbol = "[оӮ¶](#ff003c)[ вңҳ $status ](bg:#ff003c fg:#ffffff bold)[оӮҙ](#ff003c) "

[cmd_duration]
# Set to 1 millisecond so it ALWAYS shows the time spent
min_time = 1
style = "bg:#f9e2af fg:#1e1e2e bold"
format = "[оӮ¶](#f9e2af)[уұҺ« $duration ]($style)[оӮҙ](#f9e2af)"

[git_branch]
symbol = "пҗҳ "
style = "bg:#ff16b0 fg:#ffffff bold"
format = "[оӮ¶](#ff16b0)[$symbol$branch ]($style)[оӮҙ](#ff16b0) "

[nodejs]
symbol = "оңҳ "
style = "bg:#12ff00 fg:#000000 bold"
format = "[оӮ¶](#12ff00)[$symbol$version ]($style)[оӮҙ](#12ff00) "

[c]
symbol = "оҳһ "
style = "bg:#1ba6fa fg:#ffffff bold"
format = "[оӮ¶](#1ba6fa)[$symbol$version ]($style)[оӮҙ](#1ba6fa) "

[java]
symbol = "оү– "
style = "bg:#ff5d00 fg:#ffffff bold"
format = "[оӮ¶](#ff5d00)[$symbol$version ]($style)[оӮҙ](#ff5d00) "

[character]
# The curved arrow pointing exactly to where you type!
success_symbol = "[ в•°в”ҖвқҜ](#00e5ff bold)"
error_symbol = "[ в•°в”ҖвқҜ](#ff003c bold)"
