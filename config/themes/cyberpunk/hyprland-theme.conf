# ╔══════════════════════════════════════════════════════════╗
# ║  CYBERPUNK THEME — Neon Cyan × Hot Red                   ║
# ║  Border colors + decoration values for glassmorphism     ║
# ╚══════════════════════════════════════════════════════════╝

general {
    col.active_border = rgba(00e5ffee) rgba(ff003cee) 45deg
    col.inactive_border = rgba(1a1a26cc)
}

decoration {
    rounding = 10
    rounding_power = 2

    shadow {
        enabled = true
        range = 12
        render_power = 2
        color = rgba(00ffff44)
    }

    blur {
        enabled = true
        size = 6                   # wide soft frost → "liquid glass"
        passes = 2                 # 2 passes = glassy but ~40% lighter than 3 (cooler)
        vibrancy = 0.30            # richer colour bleed through the glass
        vibrancy_darkness = 0.2
        contrast = 1.10            # crisper glass edges
        brightness = 1.0
        new_optimizations = true   # cache the blur result
        xray = true                # sample wallpaper only (keeps passes=3 cheap)
        ignore_opacity = true      # full-strength frost behind opacity-ruled windows (glassy apps)
    }
}

group {
    col.border_active = rgba(00e5ffee) rgba(ff003cee) 45deg
    col.border_inactive = rgba(1a1a26cc)

    groupbar {
        col.active = rgba(3a1f5dff)
        col.inactive = rgba(1a1a26cc)
    }
}
