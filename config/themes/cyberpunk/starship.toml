# ╔══════════════════════════════════════════════════════════╗
# ║  CYBERPUNK STARSHIP — Modern macOS / iTerm2 aesthetic    ║
# ║  Two-line prompt · Nerd Font optional · Clean & bold     ║
# ╚══════════════════════════════════════════════════════════╝

add_newline = false

# ── Layout ───────────────────────────────────────────────────
# Line 1: ╭─ [user] in [dir]  on [branch]  [langs]
# Line 2: ╰─❯  (cyan=ok, red=error)
format = """
$line_break\
[╭─](fg:#555555)\
$username\
$directory\
$git_branch\
$git_status\
$nodejs\
$c\
$java\
$fill\
$cmd_duration\
$time\
$line_break\
[╰─❯](fg:#00e5ff bold) \
"""

# RIGHT prompt empty — everything lives on the top bar
right_format = "$status"

# ── Username (only shown when not default user) ────────────────
[username]
show_always = false
style_user  = "fg:#888888"
style_root  = "fg:#ff003c bold"
format      = "[$user](fg:#888888) in "

# ── Directory ────────────────────────────────────────────────
[directory]
style            = "fg:#00e5ff bold"
format           = "[$path]($style) "
truncation_length = 3
truncate_to_repo  = false
truncation_symbol = "…/"
read_only         = " 🔒"

# ── Git Branch ───────────────────────────────────────────────
[git_branch]
symbol = " "
style  = "fg:#ff16b0"
format = "on [$symbol$branch]($style) "

# ── Git Status (inline dirty/ahead/behind indicators) ────────
[git_status]
style    = "fg:#ffea16"
format   = "([$all_status$ahead_behind]($style) )"
conflicted = "⚡"
ahead      = "↑${count}"
behind     = "↓${count}"
diverged   = "↕${ahead_count}↓${behind_count}"
untracked  = "?"
modified   = "~"
staged     = "+"
deleted    = "✘"

# ── Language modules ─────────────────────────────────────────
[nodejs]
symbol = ""
style  = "fg:#12ff00"
format = "[node $version]($style) "

[c]
symbol = ""
style  = "fg:#1ba6fa"
format = "[c $version]($style) "

[java]
symbol = ""
style  = "fg:#ff5d00"
format = "[java $version]($style) "

# ── Fill (pushes time to the right on line 1) ────────────────
[fill]
symbol = " "
style  = "fg:#1a1a1a"

# ── Clock (top-right of line 1) ──────────────────────────────
[time]
disabled  = false
style     = "fg:#555555"
format    = "[$time]($style)"
time_format = "%H:%M"

# ── Command Duration ─────────────────────────────────────────
[cmd_duration]
min_time = 500
style    = "fg:#f9e2af"
format   = "[$duration]($style) "

# ── Status (right prompt — only shown on error) ──────────────
[status]
disabled       = false
format         = "$symbol"
success_symbol = ""
symbol         = "[✘$status](fg:#ff003c bold)"
