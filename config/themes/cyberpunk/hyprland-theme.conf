# ╔══════════════════════════════════════════════════════════╗
# ║  CYBERPUNK THEME — Neon Cyan × Hot Red                   ║
# ║  Border colors + decoration values for glassmorphism     ║
# ╚══════════════════════════════════════════════════════════╝

general {
    col.active_border = rgba(00e5ffee) rgba(ff003cee) 45deg
    col.inactive_border = rgba(1a1a26cc)
}

decoration {
    rounding = 10
    rounding_power = 2

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(00ffff44)
    }

    blur {
        enabled = true
        size = 5
        passes = 2
        vibrancy = 0.1696
    }
}

group {
    col.border_active = rgba(00e5ffee) rgba(ff003cee) 45deg
    col.border_inactive = rgba(1a1a26cc)

    groupbar {
        col.active = rgba(3a1f5dff)
        col.inactive = rgba(1a1a26cc)
    }
}
