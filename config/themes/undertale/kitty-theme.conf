# ╔══════════════════════════════════════════════════════════╗
# ║  UNDERTALE KITTY THEME — Strict 1-Bit Monochrome        ║
# ║  Two colors only: Black (#000000) and White (#FFFFFF)    ║
# ╚══════════════════════════════════════════════════════════╝

# Pixel font override (last value wins over kitty.conf)
font_family      Terminess Nerd Font
bold_font        Terminess Nerd Font Bold
italic_font      Terminess Nerd Font Italic
bold_italic_font Terminess Nerd Font Bold Italic
font_size        16.0

# Force opaque background for 1-bit purity
background_opacity 1.0

foreground #ffffff
background #000000
selection_foreground #000000
selection_background #ffffff
color0  #000000
color1  #ffffff
color2  #ffffff
color3  #ffffff
color4  #ffffff
color5  #ffffff
color6  #ffffff
color7  #ffffff
color8  #666666
color9  #ffffff
color10 #ffffff
color11 #ffffff
color12 #ffffff
color13 #ffffff
color14 #ffffff
color15 #ffffff

# URL styles
url_color #ffffff
url_style single

# Cursor styles
cursor #ffffff

# Tab styles
active_tab_foreground   #000000
active_tab_background   #ffffff
inactive_tab_foreground #ffffff
inactive_tab_background #000000

# Suppress fastfetch logo and colors in Undertale mode
env FASTFETCH_ARGS=
