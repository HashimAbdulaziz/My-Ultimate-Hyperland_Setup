# #######################################################################################
# HASHIM'S HYPRLAND MASTER CONFIGURATION
# Theme: Neon Cyberpunk (Cyan & Hot Red) | Optimized for Dual-Monitor 60Hz
# #######################################################################################

autogenerated = 0 
source = ~/.config/hypr/dynamic_mode.conf
source = ~/.config/hypr/current-theme.conf
################
### MONITORS ###
################
# --- Monitor Layout ---
# External AOC Monitor (Primary) is locked to its hardware max of 60Hz. Placed on the left (0x0)
monitor=DP-3,1920x1080@60,0x0,1

# Check laptop lid state every time this config is reloaded to prevent "ghost" rendering!
exec = ~/.config/hypr/clamshell.sh

# --- Workspace Routing ---
# Force Workspaces 1, 2, and 3 to ALWAYS open on the External Monitor
workspace = 1, monitor:DP-3, default:true
workspace = 2, monitor:DP-3
workspace = 3, monitor:DP-3

# Send Workspaces 4 and 5 to the Laptop Screen
workspace = 4, monitor:eDP-1, default:true
workspace = 5, monitor:eDP-1

###################
### MY PROGRAMS ###
###################
# Core system applications
$terminal = kitty
$menu = pkill rofi || rofi -show drun -theme ~/.config/rofi/launcher/type-7/style-1.rasi

#################
### AUTOSTART ###
#################
# These background services boot up the second you log in
exec-once = waybar                                           # Top status bar
exec-once = wl-paste --type text --watch cliphist store      # Text clipboard manager
exec-once = wl-paste --type image --watch cliphist store     # Image clipboard manager
exec-once = hypridle &                                       # Idle daemon (auto-lock screen)
exec-once = swaync &                                         # Notification center
exec-once = hyprpaper                                        # Wallpaper engine
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = sleep 1 && hyprpm reload -n
exec-once = sleep 2 && ~/.config/hypr/mission-control.sh     # boot: load hyprexpo + bind SUPER+S
exec      = ~/.config/hypr/mission-control.sh                # re-apply on every reload (theme-swaps drop runtime binds)

#############################
### ENVIRONMENT VARIABLES ###
#############################
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Classic
env = HYPRCURSOR_THEME,Bibata-Modern-Classic
# Fix WebKitGTK "Oops" web-process crashes (nemo-preview Quick Look, etc.) on
# this Wayland + hybrid-GPU setup — disable the DMABUF renderer it chokes on.
env = WEBKIT_DISABLE_DMABUF_RENDERER,1
# ─── GPU: INTEL-PRIMARY RENDERING ───
# Both displays are physically wired to the Intel iGPU, so the desktop renders
# on Intel for direct, copy-free scanout (smoother, cooler, better battery).
#
# ⚠ DO NOT set AQ_DRM_DEVICES / WLR_DRM_DEVICES here.
# Hardcoding DRM device paths via `env =` makes the Aquamarine backend abort
# (SIGABRT → "IOT instruction (core dumped)"): the renderer picks its devices at
# startup, before this env block is (re)applied, so a literal device list that
# doesn't match the kernel's runtime state crashes the compositor. Device
# selection is left to the hardware MUX + Hyprland auto-detection, which already
# chooses the Intel iGPU because both outputs are wired to it.
env = XDG_SESSION_TYPE,wayland

# NVIDIA-forcing vars are intentionally disabled for Intel-primary mode — do NOT
# re-enable them here (forcing GBM/GLX onto NVIDIA defeats iGPU rendering, and
# LIBVA=nvidia breaks HW video decode since no nvidia-vaapi-driver is installed,
# so the working Intel iHD driver is used instead). For per-app dGPU offload, see
# the env wrapper documented in ~/.scripts/launch-hyprland.sh.
# env = LIBVA_DRIVER_NAME,nvidia
# env = GBM_BACKEND,nvidia-drm
# env = __GLX_VENDOR_LIBRARY_NAME,nvidia

#####################
### LOOK AND FEEL ###
#####################
general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    
    # Border colors loaded from: ~/.config/hypr/current-theme.conf
    
    resize_on_border = false
    allow_tearing = false
}

decoration {
    # Aesthetic values (rounding, shadow, blur) loaded from theme file
    active_opacity = 1.0
    inactive_opacity = 1.0

    # Apply blur to top bars and menus
    layerrule = blur, waybar
    layerrule = ignorezero, waybar
    layerrule = blur, rofi
    layerrule = ignorezero, rofi
}

# ==========================================
# Group (Tab) Bar Styling
# ==========================================
group {
    # Border colors loaded from theme file

    # Minimal modern group indicator: no window titles, just slim rounded
    # gradient "pills" — one segment per grouped window, the active one
    # highlighted. Reclaims the vertical space the old 16px title bar ate while
    # still making it obvious a tile is grouped and how many are stacked with it.
    groupbar {
        font_family      = JetBrainsMono Nerd Font
        font_size        = 9
        render_titles    = false   # no window names
        gradients        = true    # subtle gradient accent
        height           = 4       # ONE slim line
        indicator_height = 4
        indicator_gap    = 0       # 0 = single line (was 5 → rendered as 2 stacked lines)
        rounding         = 2       # gently rounded ends
        gaps_in          = 4       # horizontal split between grouped windows
        gaps_out         = 4
        keep_upper_gap   = true
        # Segment colors (col.active / col.inactive) loaded from theme file
    }
}

# ==========================================
# Animations (Fast & Smooth)
# ==========================================
animations {
    enabled = yes

    # Bezier curves
    bezier = macEase, 0.16, 1, 0.3, 1
    bezier = snappy,  0.15, 0.9, 0.1, 1.0
    bezier = slideEase,    0.25, 1, 0.5, 1
    bezier = slideEaseOut, 0.16, 1, 0.3, 1

    # Windows
    animation = windows,    1, 3, snappy, popin 90%
    animation = windowsOut, 1, 2, snappy, popin 90%
    animation = border,     1, 2, snappy
    animation = fade,       1, 2, snappy

    # Workspaces
    animation = workspaces,        1, 4, macEase, slide
    animation = specialWorkspace,  1, 3, snappy,  fade

    # Rofi drop-down animations (Dynamic Island style)
    animation = layers,        1, 3, slideEase,    slide
    animation = layersIn,      1, 3, slideEase,    slide
    animation = layersOut,     1, 2, slideEaseOut, slide
    animation = fadeLayersIn,  1, 3, slideEase
    animation = fadeLayersOut, 1, 2, slideEaseOut
}

# ================================================================
#  Rofi windowrule — pins rofi to top of screen so slide works
# ================================================================
windowrulev2 = float,        class:^(rofi)$
windowrulev2 = pin,          class:^(rofi)$
windowrulev2 = stayfocused,  class:^(rofi)$
windowrulev2 = noborder,     class:^(rofi)$
windowrulev2 = noshadow,     class:^(rofi)$

dwindle {
    pseudotile = true 
    preserve_split = true 
}

master {
    new_status = master
}

misc {
    force_default_wallpaper = -1
    disable_hyprland_logo = true
}

# ─── Cursor (hardware cursors on Intel iGPU) ───
# Now that rendering is Intel-primary, hardware cursors are the better choice:
# Intel's HW cursor plane is rock-solid and — unlike software cursors — moving
# the mouse no longer forces a full recomposite/blur recompute every frame.
# (Trade-off: the dynamic-cursors shake-to-find plugin below is disabled, since
# it can't scale a hardware cursor. Re-enable both together to bring it back.)
cursor {
    no_hardware_cursors = false
    no_break_fs_vrr = true
}

#############
### INPUT ###
#############
input {
    kb_layout = us, ara
    kb_options = grp:win_space_toggle
    follow_mouse = 1
    sensitivity = 0 
    touchpad {
        natural_scroll = true
    }
}

gesture = 3, horizontal, workspace

###################
### KEYBINDINGS ###
###################
$mainMod = SUPER 

# ─── Core System ───
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, C, killactive,
bind = $mainMod, M, exit,
bind = $mainMod, R, exec, $menu
bind = $mainMod, L, exec, hyprlock

# ─── Waybar Controls ───
bind = $mainMod SHIFT, B, exec, killall -SIGUSR1 waybar    # Toggle Hide/Show for maximum screen space
bind = $mainMod SHIFT, W, exec, killall waybar; waybar &   # Panic Button: Hard restart waybar if it crashes

# ─── Fullscreen Modes ───
bind = $mainMod, F, fullscreen, 1          # macOS Maximize (keeps curves & bar)
bind = $mainMod SHIFT, F, fullscreen, 0    # True Fullscreen (kills curves, 100% screen)

# ─── Window Tiling Controls ───
bind = $mainMod, V, togglefloating,
bind = $mainMod, P, pseudo, 
bind = $mainMod, J, togglesplit, 
bind = $mainMod SHIFT, P, pin, active      # Pin floating window to all workspaces
bind = $mainMod SHIFT, R, exec, ~/.config/hypr/toggle-layout.sh   # Dynamic Layout Swapper

# Move Focus (Arrow Keys) handled by dynamic_mode.conf

# Swap Physical Window Positions (Shift + Arrow Keys) handled by dynamic_mode.conf

# ─── Workspace Navigation ───
bind = $mainMod, TAB, workspace, previous  # Quick-toggle to last workspace (Dev Alt-Tab)

bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

# Move Active Window to Workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Mouse Controls (Scroll workspaces, Drag to move/resize)
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# ─── Theme Swapping ───
bind = SUPER SHIFT, Q, exec, ~/.scripts/theme-swapper.sh cyberpunk               # Theme: Cyberpunk
bind = SUPER SHIFT, E, exec, ~/.scripts/theme-swapper.sh undertale               # Theme: Undertale

# ─── Utilities & Tools ───
bind = SUPER, Y, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy  # Clipboard History
bind = SUPER, O, exec, grim -g "$(slurp)" - | wl-copy                            # Screenshot to Clipboard
bind = SUPER, D, exec, sh -c 'grim -g "$(slurp)" - | swappy -f -'                # Screenshot to Editor
bind = SUPER, B, exec, pkill rofi || bash ~/.config/rofi/widgets/bluetooth.sh     # Bluetooth menu
bind = SUPER, N, exec, swaync-client -t -sw                                      # Notifications
bind = SUPER, A, exec, pavucontrol                                               # Audio Mixer

# ─── Floating Terminal Apps ───
bind = SUPER, E, exec, nemo                                                      # Nemo File Manager (GUI)
bind = SUPER SHIFT, E, exec, kitty --class ranger -e ranger                      # Ranger File Manager (TUI)
bind = SUPER, ESCAPE, exec, kitty --class btop -e btop                           # Btop System Monitor

# ─── Dropdown Scratchpad ───
bind = SUPER, grave, togglespecialworkspace, scratchpad                          # Toggle with the `~` key

# ─── Hardware Media Keys ───
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Disable laptop screen when lid is closed, re-enable when open
bindl = , switch:on:Lid Switch, exec, ~/.config/hypr/clamshell.sh
bindl = , switch:off:Lid Switch, exec, ~/.config/hypr/clamshell.sh

# ─── Taskwarrior Hotkeys ───
bind = SUPER, T, exec, ~/.scripts/task-toggle.sh
bind = SUPER SHIFT, T, exec, kitty --class task-manager env HIDE_FETCH=1 zsh -c 'clear; task; exec zsh'


# ==========================================
# Tabbed Group & Override Controls
# ==========================================
bind = ALT, Tab, exec, ~/.config/hypr/smart_tab.sh f
bind = ALT SHIFT, Tab, exec, ~/.config/hypr/smart_tab.sh b

bind = SUPER SHIFT, I, exec, ~/.config/hypr/toggle-invert.sh

# ─── Solar Zen Mode Toggle (ASCII solar system bg + void aesthetic) ───
bind = SUPER, I, exec, ~/.scripts/solar-zen-toggle.sh

# Grouping and window insertion rules handled by dynamic_mode.conf

##############################
### WINDOWS AND WORKSPACES ###
##############################

# Core XWayland and Focus fixes (Using correct V2 syntax)
windowrulev2 = suppressevent maximize, class:.*
windowrulev2 = nofocus, class:^$, title:^$, xwayland:1, floating:1, fullscreen:0, pinned:0

# App-specific Opacity
windowrulev2 = opacity 0.92 0.75, class:^(obsidian)$
windowrulev2 = opacity 0.97 0.70, class:^(kitty)$

# ─── Glassy Files (frosted-glass file manager) ───
# Compositor-level translucency + blur = macOS-style frosted glass on any toolkit.
windowrulev2 = opacity 0.80 0.72, class:^(nemo)$
windowrulev2 = opacity 0.82 0.74, class:^(org.gnome.Nautilus)$

# ─── Glass for utility / popup windows (cohesive frosted desktop) ───
windowrulev2 = opacity 0.86 0.80, class:^(org.pulseaudio.pavucontrol|pavucontrol)$
windowrulev2 = opacity 0.86 0.80, class:^(\.?blueman-manager(-wrapped)?)$
windowrulev2 = opacity 0.86 0.80, class:^(nm-connection-editor)$
windowrulev2 = opacity 0.88 0.82, class:^(org.gnome.Calculator|gnome-calculator)$
windowrulev2 = opacity 0.88 0.82, class:^(xdg-desktop-portal-gtk)$
windowrulev2 = opacity 0.90 0.84, class:^(org.gnome.FileRoller|file-roller)$

# ─── Floating Tool Rules (Ranger & Btop) ───
windowrulev2 = float, class:^(ranger)$
windowrulev2 = size 70% 70%, class:^(ranger)$
windowrulev2 = center, class:^(ranger)$

windowrulev2 = float, class:^(btop)$
windowrulev2 = size 70% 70%, class:^(btop)$
windowrulev2 = center, class:^(btop)$
# ─── Floating Task Manager Rules ───
windowrulev2 = float, class:^(task-manager)$
windowrulev2 = size 60% 50%, class:^(task-manager)$
windowrulev2 = center, class:^(task-manager)$
windowrulev2 = animation popin 80%, class:^(task-manager)$

# ─── Drop-down Scratchpad Rules ───
workspace = special:scratchpad, on-created-empty: kitty --class kitty-scratchpad
windowrulev2 = float, class:^(kitty-scratchpad)$
windowrulev2 = size 60% 50%, class:^(kitty-scratchpad)$
windowrulev2 = center, class:^(kitty-scratchpad)$
windowrulev2 = noborder, class:^(kitty-scratchpad)$
windowrulev2 = opacity 1.0 override, class:^(kitty-scratchpad)$
windowrulev2 = workspace special:scratchpad silent, class:^(kitty-scratchpad)$


# ─── Solar System Background (Layer Shell — kitty panel kitten) ─────────────
# `kitty +kitten panel --edge=background` registers as a wlr-layer-shell
# surface at the compositor's BACKGROUND layer — physically below ALL windows.
# layerrule targets it by NAMESPACE (not class). The namespace is set by kitty
# and discoverable at runtime: press SUPER+I, then run: hyprctl layers
# Look for the surface on monitor DP-3/eDP-1 in the "background" level.
# Confirmed runtime namespace: kitty-panel (set by `kitty +kitten panel`)
#
# NOTE: layerrule noanim suppresses Hyprland trying to animate a layer surface.
# blur makes the terminal frosted-glass over the void.
layerrule = noanim, kitty-panel
layerrule = blur, kitty-panel
layerrule = ignorezero, kitty-panel


# ==========================================
# The Mental Map: Smart Workspace Routing
# ==========================================
# Window rules are handled dynamically in dynamic_mode.conf

# ==========================================
# Cursor Plugin (macOS Shake to Find)
# ==========================================
plugin {
    dynamic-cursors {
        enabled = false   # disabled → hardware cursors (set no_hardware_cursors=false above)
        mode = none
        
        shake {
            enabled = true
            nearest = false
            threshold = 4.5
            base = 1.0
            speed = 3.5
            influence = 5.5
            limit = 0.0
        }
    }

    # ── Mission Control (hyprexpo) — kept commented until the plugin is actually
    #    loaded (hyprpm enable hyprexpo). An unloaded dispatcher throws a config
    #    error, so the bind below stays off until then.
    # hyprexpo {
    #     columns = 3
    #     gap_size = 6
    #     bg_col = rgb(0a0a12)
    #     workspace_method = first 1
    #     enable_gesture = true
    #     gesture_fingers = 4
    #     gesture_distance = 300
    #     gesture_positive = false
    # }
}

